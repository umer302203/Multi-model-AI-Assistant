<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant · Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #f0f4ff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --accent-1: #6e8efb;
            --accent-2: #a777e3;
            --gradient: linear-gradient(135deg, #6e8efb, #a777e3);
            --radius: 16px;
            --radius-sm: 12px;
        }

        html,
        body {
            height: 100%;
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0e1a;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a1f3a 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #2d1b4e 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, #0f2a44 0%, transparent 50%),
                #0b0e1a;
            z-index: -2;
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 100%;
            }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 70% 30%, rgba(110, 142, 251, 0.08), transparent 50%),
                radial-gradient(circle at 30% 70%, rgba(167, 119, 227, 0.06), transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* App Container */
        .app-container {
            max-width: 820px;
            height: 92vh;
            max-height: 780px;
            margin: 4vh auto;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clear-btn {
            display: none;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        .clear-btn:hover {
            background: rgba(255, 70, 70, 0.12);
            border-color: rgba(255, 70, 70, 0.2);
            color: #ff8a8a;
        }
        .clear-btn.visible {
            display: inline-flex;
        }
        .clear-btn svg {
            flex-shrink: 0;
        }

        /* Chat */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 8px 24px;
            scroll-behavior: smooth;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .messages-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 100%;
        }

        /* Welcome */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px 20px;
            animation: fadeUp 0.5s ease both;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(110, 142, 251, 0.2);
        }
        .welcome-icon svg {
            stroke: #fff;
            stroke-width: 1.8;
        }
        .welcome-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .welcome-text {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 380px;
            line-height: 1.6;
        }

        /* Messages */
        .messages-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 8px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: msgIn 0.3s ease both;
            max-width: 88%;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 4px 12px rgba(110, 142, 251, 0.15);
        }
        .message.user .avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
        }
        .message .bubble {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            word-break: break-word;
        }
        .message.user .bubble {
            background: var(--gradient);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 20px rgba(110, 142, 251, 0.2);
        }
        .message .bubble .msg-meta {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
        }
        .message.user .bubble .msg-meta {
            color: rgba(255, 255, 255, 0.5);
        }
        .message .bubble .msg-sentiment {
            display: inline-block;
            font-size: 11px;
            padding: 1px 10px;
            border-radius: 100px;
            margin-top: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }
        .message.user .bubble .msg-sentiment {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.75);
        }

        /* Loading */
        .loading-indicator {
            display: none;
            padding: 8px 0 4px 0;
            animation: msgIn 0.3s ease both;
        }
        .loading-indicator.active {
            display: block;
        }
        .loading-bubble {
            display: inline-flex;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-sm);
            padding: 12px 18px;
            align-items: center;
            gap: 14px;
        }
        .loading-dots {
            display: flex;
            gap: 5px;
        }
        .loading-dots .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-1);
            animation: dotPulse 1.4s ease-in-out infinite both;
        }
        .loading-dots .dot:nth-child(1) { animation-delay: 0s; }
        .loading-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .loading-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Input */
        .input-area {
            padding: 14px 24px 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }
        .chat-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .model-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .model-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .select-wrapper {
            position: relative;
            display: inline-block;
        }
        .select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 12px;
            pointer-events: none;
        }
        .model-select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 100px;
            padding: 6px 36px 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            outline: none;
        }
        .model-select:hover { background: rgba(255, 255, 255, 0.08); }
        .model-select:focus { border-color: var(--accent-1); }
        .model-select option { background: #1a1f3a; }

        .input-section {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .textarea-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-sm);
            transition: 0.3s;
        }
        .textarea-container:focus-within {
            border-color: rgba(110, 142, 251, 0.25);
            background: rgba(255, 255, 255, 0.05);
        }
        .message-textarea {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            resize: none;
            line-height: 1.5;
            min-height: 48px;
            max-height: 140px;
        }
        .message-textarea::placeholder {
            color: var(--text-muted);
        }
        .send-button {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--gradient);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s;
            box-shadow: 0 4px 16px rgba(110, 142, 251, 0.2);
        }
        .send-button:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px rgba(110, 142, 251, 0.3);
        }
        .send-button:active { transform: scale(0.94); }
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .send-button svg {
            stroke: #fff;
            stroke-width: 2.2;
            width: 18px;
            height: 18px;
        }
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
        }
        .spinner {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container {
                margin: 8px;
                height: 96vh;
                max-height: none;
                border-radius: 14px;
            }
            .header {
                padding: 14px 16px;
            }
            .header-title {
                font-size: 17px;
            }
            .messages-area {
                padding: 14px 16px 4px 16px;
            }
            .input-area {
                padding: 10px 16px 16px 16px;
            }
            .message {
                max-width: 94%;
            }
            .welcome-title {
                font-size: 19px;
            }
            .welcome-text {
                font-size: 13px;
            }
        }
        @media (max-width: 400px) {
            .message .bubble {
                font-size: 13px;
                padding: 10px 14px;
            }
            .message .avatar {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
            .send-button {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body class="font-ibm-plex">
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <h1 class="header-title">AI Assistant</h1>
                <button id="clearBtn" class="clear-btn" style="display: none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m3 6 18 0"></path>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                    </svg>
                    Clear Chat
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container">
            <!-- Messages Area -->
            <div class="messages-area">
                <div class="messages-content">
                    <!-- Welcome Screen -->
                    <div id="welcomeScreen" class="welcome-screen">
                        <div class="welcome-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                <line x1="9" y1="9" x2="9.01" y2="9"/>
                                <line x1="15" y1="9" x2="15.01" y2="9"/>
                            </svg>
                        </div>
                        <h2 class="welcome-title">Welcome to AI Assistant</h2>
                        <p class="welcome-text">Choose a model and start a conversation. I'm here to help with your questions and tasks.</p>
                    </div>

                    <!-- Messages Container -->
                    <div id="messagesContainer" class="messages-container"></div>

                    <!-- Loading Indicator -->
                    <div id="loadingIndicator" class="loading-indicator" style="display: none;">
                        <div class="loading-bubble">
                            <div class="loading-content">
                                <div class="loading-dots">
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                    <div class="dot"></div>
                                </div>
                                <span class="loading-text">AI is thinking...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Messages End -->
                    <div id="messagesEnd"></div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-content">
                    <form id="chatForm" class="chat-form">
                        <!-- Model Selection -->
                        <div class="model-section">
                            <span class="model-label">Model:</span>
                            <div class="select-wrapper">
                                <select id="modelSelect" class="model-select">
                                    <option value="llama">Llama</option>
                                    <option value="granite">Granite</option>
                                    <option value="mistral">Mistral</option>
                                </select>
                            </div>
                        </div>

                        <!-- Message Input -->
                        <div class="input-section">
                            <div class="textarea-container">
                                <textarea 
                                    id="messageInput" 
                                    class="message-textarea"
                                    placeholder="Type your message... (Enter to send, Shift+Enter for new line)"
                                    rows="1"
                                ></textarea>
                            </div>
                            
                            <button type="submit" id="sendButton" class="send-button">
                                <svg id="sendIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22,2 15,22 11,13 2,9 22,2"></polygon>
                                </svg>
                                <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                                    <div class="spinner"></div>
                                </div>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM refs =====
        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendButton');
        const sendIcon = document.getElementById('sendIcon');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const modelSelect = document.getElementById('modelSelect');
        const messagesContainer = document.getElementById('messagesContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const clearBtn = document.getElementById('clearBtn');
        const messagesEnd = document.getElementById('messagesEnd');

        let isProcessing = false;

        // ===== Auto-resize textarea =====
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 140) + 'px';
        });

        // ===== Enter to send (Shift+Enter = new line) =====
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        // ===== Clear chat =====
        clearBtn.addEventListener('click', () => {
            messagesContainer.innerHTML = '';
            welcomeScreen.style.display = 'flex';
            clearBtn.classList.remove('visible');
            try { localStorage.removeItem('chatHistory'); } catch (_) {}
        });

        // ===== Save / restore =====
        function saveChat() {
            const html = messagesContainer.innerHTML;
            try { localStorage.setItem('chatHistory', html); } catch (_) {}
        }

        function restoreChat() {
            try {
                const saved = localStorage.getItem('chatHistory');
                if (saved && saved.trim().length > 0) {
                    messagesContainer.innerHTML = saved;
                    welcomeScreen.style.display = 'none';
                    clearBtn.classList.add('visible');
                    scrollToBottom();
                }
            } catch (_) {}
        }

        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            requestAnimationFrame(() => {
                area.scrollTop = area.scrollHeight;
            });
        }

        // ===== Add message =====
        function addMessage(role, content, meta = '') {
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'U' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            const p = document.createElement('div');
            p.textContent = content;
            bubble.appendChild(p);

            if (meta) {
                const span = document.createElement('span');
                span.className = 'msg-meta';
                span.textContent = meta;
                bubble.appendChild(span);
            }

            div.appendChild(avatar);
            div.appendChild(bubble);
            messagesContainer.appendChild(div);
            welcomeScreen.style.display = 'none';
            clearBtn.classList.add('visible');
            scrollToBottom();
            saveChat();
        }

        // ===== Loading =====
        function setLoading(active) {
            if (active) {
                loadingIndicator.classList.add('active');
                loadingIndicator.style.display = 'block';
                sendBtn.disabled = true;
                sendIcon.style.display = 'none';
                loadingSpinner.style.display = 'block';
            } else {
                loadingIndicator.classList.remove('active');
                loadingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                sendIcon.style.display = 'block';
                loadingSpinner.style.display = 'none';
            }
        }

        // ===== Submit =====
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message || isProcessing) return;

            const model = modelSelect.value;

            addMessage('user', message);
            input.value = '';
            input.style.height = 'auto';

            isProcessing = true;
            setLoading(true);

            try {
                const resp = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, model })
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`Server error: ${resp.status} – ${errText}`);
                }

                const data = await resp.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                let reply = data.response || 'No response generated.';
                let metaParts = [];
                if (data.summary) {
                    metaParts.push(`📝 ${data.summary}`);
                }
                if (typeof data.sentiment === 'number') {
                    const emoji = data.sentiment >= 70 ? '😊' : data.sentiment >= 40 ? '😐' : '😟';
                    metaParts.push(`${emoji} Sentiment: ${data.sentiment}/100`);
                }
                if (data.duration) {
                    metaParts.push(`⏱ ${(data.duration * 1000).toFixed(0)}ms`);
                }

                const meta = metaParts.join(' · ');
                addMessage('ai', reply, meta);

            } catch (err) {
                addMessage('ai', `⚠️ ${err.message}`, 'Error');
                console.error('Chat error:', err);
            } finally {
                isProcessing = false;
                setLoading(false);
            }
        });

        // ===== Init =====
        restoreChat();
        if (messagesContainer.children.length === 0) {
            welcomeScreen.style.display = 'flex';
        } else {
            welcomeScreen.style.display = 'none';
            clearBtn.classList.add('visible');
        }
        scrollToBottom();
    </script>
</body>
</html>
